services:
  postgres:
    image: postgres:16-alpine
    container_name: treasury-copilot-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB: treasury
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot -d treasury"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
